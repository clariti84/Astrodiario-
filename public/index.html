<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El Diario de los Astros · 16 mayo 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 20% 0%, #0d1a0a 0%, #090f06 50%, #040804 100%);
      font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
      color: #e8dfc8;
      overflow-x: hidden;
    }
    #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    @keyframes twinkle  { 0%,100%{opacity:0;transform:scale(.8)} 50%{opacity:.8;transform:scale(1.2)} }
    @keyframes floatUp  { 0%{opacity:0;transform:translateY(26px)} 100%{opacity:1;transform:translateY(0)} }
    @keyframes glow     { 0%,100%{box-shadow:0 0 16px #c9a04466,0 0 32px #c9a04422} 50%{box-shadow:0 0 28px #c9a044aa,0 0 52px #c9a04444} }
    @keyframes shimmer  { 0%{background-position:-200% center} 100%{background-position:200% center} }
    @keyframes drift    { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-8px) rotate(2deg)} }
    @keyframes reveal   { 0%{opacity:0;transform:rotateY(90deg)} 100%{opacity:1;transform:rotateY(0)} }
    @keyframes msgIn    { 0%{opacity:0;transform:translateY(8px)} 100%{opacity:1;transform:translateY(0)} }
    @keyframes pulse    { 0%,100%{opacity:.5} 50%{opacity:1} }
    @keyframes moonGlow { 0%,100%{filter:drop-shadow(0 0 8px #c9a04466)} 50%{filter:drop-shadow(0 0 20px #c9a044cc)} }
    .wrapper { max-width: 500px; margin: 0 auto; padding: 36px 20px 70px; position: relative; z-index: 1; }
    .header { text-align: center; margin-bottom: 30px; animation: floatUp .8s ease forwards; }
    .header-date { font-size: 10px; letter-spacing: 6px; color: #c9a044; text-transform: uppercase; margin-bottom: 8px; }
    .header-title { font-size: 30px; font-weight: normal; font-style: italic; margin-bottom: 6px; background: linear-gradient(135deg, #c9a044, #e8d080, #e8dfc8, #c9a044); background-size: 300% auto​​​​​​​​​​​​​​​​
